org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configuration-cache=false

# Run the Gradle daemon and the Java 21 toolchain on the locally-installed JDK 21
# (the machine's default JVM is newer than Gradle 8.10.2 supports).
org.gradle.java.home=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home
org.gradle.java.installations.paths=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home
