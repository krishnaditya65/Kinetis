openapi: 3.1.0
info:
  title: Kinetis API
  version: 0.1.0
  description: >
    REST contract for the distributed job scheduler (Phase 1). Node-to-node and scheduler↔worker
    communication is DB-mediated in Phase 1 and becomes gRPC in Phase 3 (see ../specs/README.md).
servers:
  - url: http://localhost:8080
    description: Local (docker compose)

paths:
  /jobs:
    post:
      summary: Submit a job
      description: >
        Idempotent on the idempotency key. If a job with the same key already exists, returns 200
        with created=false and the existing job/run ids; otherwise 201 with created=true.
      operationId: submitJob
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmitJobRequest' }
            examples:
              delayed:
                summary: One-off, due in 5s
                value: { jobType: sleep, payload: { ms: 2000 }, scheduleAt: "+5s" }
              retrying:
                summary: Fails twice then succeeds
                value: { jobType: failNTimes, payload: { failTimes: 2 }, maxAttempts: 5, backoffBaseMs: 500 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmitJobResponse' }
        '200':
          description: Deduplicated against an existing job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmitJobResponse' }
        '400':
          description: Validation or parse error
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }

  /jobs/{jobId}:
    get:
      summary: Get a job definition
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobView' }
        '404':
          description: Not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }
    delete:
      summary: Cancel a job
      description: Marks all non-terminal runs of the job CANCELLED.
      operationId: cancelJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Cancellation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string, format: uuid }
                  cancelledRuns: { type: integer }
        '404':
          description: Not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }

  /jobs/{jobId}/runs:
    get:
      summary: List runs for a job
      operationId: getRuns
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunView' }
        '404':
          description: Not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }

  /jobs/{jobId}/next-fire:
    get:
      summary: Next scheduled fire time for a recurring job
      operationId: nextFire
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Next fire time (null for one-off jobs or if cron is disabled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string, format: uuid }
                  nextFireTime: { type: string, description: ISO-8601 instant or "null" }
                  note: { type: string, description: present only when nextFireTime is null }
        '404':
          description: Not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }

  /actuator/health:
    get:
      summary: Liveness/readiness
      operationId: health
      responses:
        '200': { description: UP }
  /actuator/prometheus:
    get:
      summary: Prometheus metrics scrape
      operationId: prometheus
      responses:
        '200':
          description: Metrics in Prometheus text format
          content:
            text/plain: {}

components:
  parameters:
    JobId:
      name: jobId
      in: path
      required: true
      schema: { type: string, format: uuid }

  schemas:
    DeliveryPolicy:
      type: string
      enum: [AT_LEAST_ONCE, AT_MOST_ONCE]
    MisfirePolicy:
      type: string
      enum: [SKIP, FIRE_ONCE, CATCH_UP]
    JobState:
      type: string
      enum: [SCHEDULED, LEASED, RUNNING, SUCCEEDED, FAILED, DEAD_LETTER, CANCELLED]

    SubmitJobRequest:
      type: object
      required: [jobType]
      properties:
        jobType: { type: string, description: routes to a registered handler, example: sleep }
        payload: { type: object, additionalProperties: true, description: handler arguments }
        idempotencyKey:
          type: string
          description: Optional. Dedups submission. Auto-derived from type+payload if omitted.
        deliveryPolicy: { $ref: '#/components/schemas/DeliveryPolicy' }
        scheduleAt:
          type: string
          description: >
            When the first run is due. ISO-8601 instant (2026-06-03T12:00:00Z) or a relative offset
            "+5s" / "+2m" / "+1h" / "+3d" / "+500ms". Defaults to now.
        cronExpr: { type: string, description: "Phase 2; ignored in Phase 1" }
        timezone: { type: string, default: UTC }
        misfirePolicy: { $ref: '#/components/schemas/MisfirePolicy' }
        maxAttempts: { type: integer, minimum: 1, default: 3 }
        backoffBaseMs: { type: integer, format: int64, default: 1000 }
        backoffFactor: { type: number, default: 2.0 }

    SubmitJobResponse:
      type: object
      properties:
        jobId: { type: string, format: uuid }
        runId: { type: string, format: uuid, nullable: true }
        created: { type: boolean, description: false if deduplicated against an existing job }

    JobView:
      type: object
      properties:
        id: { type: string, format: uuid }
        jobType: { type: string }
        payload: { type: string, description: JSON string }
        idempotencyKey: { type: string }
        deliveryPolicy: { $ref: '#/components/schemas/DeliveryPolicy' }
        cronExpr: { type: string, nullable: true }
        timezone: { type: string }
        misfirePolicy: { $ref: '#/components/schemas/MisfirePolicy' }
        maxAttempts: { type: integer }
        backoffBaseMs: { type: integer, format: int64 }
        backoffFactor: { type: number }
        createdAt: { type: string, format: date-time }

    RunView:
      type: object
      properties:
        id: { type: string, format: uuid }
        jobId: { type: string, format: uuid }
        state: { $ref: '#/components/schemas/JobState' }
        attempt: { type: integer }
        scheduledFor: { type: string, format: date-time }
        leaseOwner: { type: string, nullable: true }
        leaseExpiresAt: { type: string, format: date-time, nullable: true }
        leaseToken: { type: integer, format: int64, description: fencing token }
        lastError: { type: string, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }

    ProblemDetail:
      type: object
      description: RFC 7807 problem response
      properties:
        type: { type: string, default: about:blank }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
